name: Build and Deploy to EC2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- INGESTION TESTS ---
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Ingestion Service
        run: |
          cd ingestion-service
          mvn clean compile

      # --- ANALYTICS TESTS ---
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          cd analytics-service
          pip install -r requirements.txt

      # --- DASHBOARD TESTS ---
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Build Dashboard
        run: |
          cd dashboard
          npm install
          npm run build

  deploy-to-ec2:
    name: Deploy to EC2 via Docker Compose
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          script: |
            # 1. Ensure Swap Space exists (prevents OOM on EC2 t2/t3.micro)
            if [ ! -f /swapfile ]; then
              echo "Creating 2GB swap file for build stability..."
              sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi

            # 2. Ensure Docker is installed and running
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sudo sh
              sudo systemctl enable --now docker
            fi

            # 3. Clone or pull repo
            if [ ! -d "$HOME/MarketMindAI" ]; then
              git clone https://github.com/bsahil979/MarketMindAI.git $HOME/MarketMindAI
            fi

            cd $HOME/MarketMindAI
            git fetch origin main || sleep 5 && git fetch origin main
            git reset --hard origin/main

            # 4. Build and start containers
            sudo docker compose up -d --build
            sleep 5
            echo "================ CONTAINER STATUS ================"
            sudo docker compose ps -a
