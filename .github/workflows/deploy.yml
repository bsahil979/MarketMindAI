name: Build and Deploy to AWS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_INGEST: marketmind-ingestion
  ECR_REPOSITORY_ANALYTICS: marketmind-analytics
  ECR_REPOSITORY_DASHBOARD: marketmind-dashboard
  ECS_CLUSTER: marketmind-cluster
  ECS_SERVICE_INGEST: marketmind-ingestion-service
  ECS_SERVICE_ANALYTICS: marketmind-analytics-service
  ECS_SERVICE_DASHBOARD: marketmind-dashboard-service

jobs:
  build-and-test:
    name: Build & Test Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # --- INGESTION TESTS ---
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Ingestion Service
        run: |
          cd ingestion-service
          mvn clean compile

      # --- ANALYTICS TESTS ---
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          cd analytics-service
          pip install -r requirements.txt

      # --- DASHBOARD TESTS ---
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Build Dashboard
        run: |
          cd dashboard
          npm install
          npm run build

  deploy-to-aws:
    name: Build Docker Images & Deploy
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # --- BUILD AND PUSH INGESTION ---
      - name: Build, tag, and push Ingestion image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_INGEST:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY_INGEST:latest ./ingestion-service
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_INGEST:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_INGEST:latest

      # --- BUILD AND PUSH ANALYTICS ---
      - name: Build, tag, and push Analytics image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_ANALYTICS:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY_ANALYTICS:latest ./analytics-service
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_ANALYTICS:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_ANALYTICS:latest

      # --- BUILD AND PUSH DASHBOARD ---
      - name: Build, tag, and push Dashboard image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_DASHBOARD:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY_DASHBOARD:latest ./dashboard
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_DASHBOARD:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_DASHBOARD:latest

      # --- ECS SERVICE REDEPLOY ---
      - name: Force ECS Cluster Redeployment
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_INGEST }} --force-new-deployment
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_ANALYTICS }} --force-new-deployment
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_DASHBOARD }} --force-new-deployment
